<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
  <title>MSN Messenger</title>
  <link rel="icon" type="image/png" href="Asset/klipartz.com%20(1).png" />
  <link rel="apple-touch-icon" href="Asset/klipartz.com%20(1).png" />
  <link rel="stylesheet" href="vendor/98.css/98.css" />
  <link rel="stylesheet" href="vendor/7.css/7.css" />
  <link rel="stylesheet" href="css/msn.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     AUTH SCREEN
═══════════════════════════════════════════ -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="butterfly-logo"></div>
      <span class="msn-brand">MSN<sup>®</sup> Messenger</span>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-panel" class="auth-panel active">
      <p class="auth-subtitle">Sign in to start</p>
      <div class="form-row">
        <label>E-mail address:</label>
        <input id="login-email" type="email" autocomplete="email" placeholder="yourname@example.com" />
      </div>
      <div class="form-row">
        <label>Password:</label>
        <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <div class="form-actions">
        <button id="login-btn" class="msn-btn primary">Sign In</button>
        <button id="goto-register" class="msn-btn">Create Account</button>
      </div>
      <p id="login-error" class="auth-error"></p>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-panel" class="auth-panel">
      <p class="auth-subtitle">Create a new account</p>
      <div class="form-row">
        <label>Username:</label>
        <input id="reg-username" type="text" placeholder="a-z, 0-9, _ (3-30 chars)" />
      </div>
      <div class="form-row">
        <label>Display Name:</label>
        <input id="reg-display" type="text" placeholder="Your name on MSN" />
      </div>
      <div class="form-row">
        <label>E-mail:</label>
        <input id="reg-email" type="email" placeholder="yourname@example.com" />
      </div>
      <div class="form-row">
        <label>Password:</label>
        <input id="reg-password" type="password" placeholder="Min 8 characters" />
      </div>
      <div class="form-actions">
        <button id="register-btn" class="msn-btn primary">Create Account</button>
        <button id="goto-login" class="msn-btn">Back to Sign In</button>
      </div>
      <p id="register-error" class="auth-error"></p>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     MAIN APP
═══════════════════════════════════════════ -->
<div id="app" class="app hidden">

  <div id="network-banner" class="network-banner hidden" role="status" aria-live="polite"></div>

  <!-- ── BUDDY LIST WINDOW ─────────────────────────────── -->
  <div id="buddy-window" class="msn-window buddy-window">
    <div class="msn-titlebar">
      <span class="win-title">MSN Messenger</span>
      <div class="win-controls">
        <button class="win-btn min" title="Minimize">_</button>
        <button class="win-btn close" id="app-logout" title="Sign out">×</button>
      </div>
    </div>

    <!-- My profile bar -->
    <div class="my-profile-bar">
      <div class="avatar-wrapper" id="my-avatar-wrap">
        <img id="my-avatar" src="img/default-avatar.png" alt="avatar" class="avatar-img" />
        <label class="avatar-upload-btn" title="Change avatar">
          <input type="file" id="avatar-input" accept="image/*" class="hidden" />
          📷
        </label>
      </div>
      <div class="my-info">
        <div class="my-name" id="my-display-name" contenteditable="true" spellcheck="false">Loading...</div>
        <div class="my-status-msg" id="my-status-msg" contenteditable="true" spellcheck="false">What's your personal message?</div>
      </div>
      <div class="my-status-selector">
        <select id="status-select">
          <option value="online">🟢 Online</option>
          <option value="away">🌙 Away</option>
          <option value="busy">🔴 Busy</option>
          <option value="be right back">⏳ Be Right Back</option>
          <option value="appear offline">⚫ Appear Offline</option>
        </select>
      </div>
    </div>

    <!-- My MSN ID display -->
    <div class="id-bar">
      <span>My MSN ID: </span>
      <strong id="my-msn-id">----------</strong>
      <button class="copy-id-btn" id="copy-id-btn" title="Copy ID">📋</button>
      <button class="copy-id-btn" id="settings-toggle-btn" title="Settings">⚙</button>
    </div>

    <!-- Add friend bar -->
    <div class="add-friend-bar">
      <input id="add-contact-input" type="text" maxlength="10" placeholder="Enter 10-digit MSN ID to add..." />
      <button id="add-contact-btn" class="msn-btn small">Add</button>
    </div>

    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-grid">
        <label>
          <span>Theme</span>
          <select id="theme-select">
            <option value="classic">Classic Blue</option>
            <option value="olive">Olive XP</option>
            <option value="silver">Silver Frost</option>
          </select>
        </label>
        <label>
          <span>Privacy</span>
          <select id="privacy-select">
            <option value="everyone">Everyone</option>
            <option value="contacts-only">Contacts Only</option>
          </select>
        </label>
      </div>
      <label class="settings-check"><input id="sounds-toggle" type="checkbox" /> Enable notification sounds</label>
      <label class="settings-check"><input id="friend-requests-toggle" type="checkbox" /> Allow friend requests</label>
      <label class="settings-check"><input id="file-transfer-toggle" type="checkbox" /> Allow file transfer</label>
    </div>

    <div class="group-bar">
      <button id="toggle-group-composer" class="msn-btn small">New Group</button>
      <span class="group-bar-text">Create shared chats with your contacts</span>
    </div>

    <div id="group-composer" class="group-composer hidden">
      <input id="group-title-input" type="text" maxlength="50" placeholder="Group name..." />
      <div id="group-member-list" class="group-member-list"></div>
      <div class="group-actions">
        <button id="create-group-btn" class="msn-btn primary small">Create Group</button>
        <button id="cancel-group-btn" class="msn-btn small">Cancel</button>
      </div>
    </div>

    <!-- Pending friend requests -->
    <div id="requests-section" class="requests-section hidden">
      <div class="section-header pending-header">⚡ Pending Requests</div>
      <div id="requests-list"></div>
    </div>

    <!-- Contacts list -->
    <div class="contacts-area">
      <div class="section-header groups-header">Groups</div>
      <div id="groups-list" class="contact-group"></div>
      <div class="section-header online-header">Online</div>
      <div id="online-list" class="contact-group"></div>
      <div class="section-header offline-header">Offline</div>
      <div id="offline-list" class="contact-group"></div>
    </div>

    <!-- Notifications popup -->
    <div id="notification-toast" class="notification-toast hidden"></div>
  </div>

  <!-- ── CHAT WINDOWS CONTAINER ──────────────────────────── -->
  <div id="chat-windows"></div>

</div>

<!-- ── CHAT WINDOW TEMPLATE ────────────────────────────── -->
<template id="chat-window-tpl">
  <div class="msn-window chat-window" data-conv-user="">
    <div class="msn-titlebar chat-titlebar">
      <span class="chat-partner-name win-title"></span>
      <div class="win-controls">
        <button class="win-btn close chat-close">×</button>
      </div>
    </div>
    <div class="chat-header-bar">
      <img class="chat-partner-avatar avatar-img" src="img/default-avatar.png" alt="" />
      <div>
        <div class="chat-partner-display"></div>
        <div class="chat-partner-status text-muted"></div>
      </div>
      <div class="chat-header-actions">
        <button class="chat-mini-btn mobile-back-btn hidden" title="Back to list">←</button>
        <button class="chat-mini-btn call-voice-btn" title="Voice call">📞</button>
        <button class="chat-mini-btn call-video-btn" title="Video call">🎥</button>
        <button class="chat-mini-btn group-rename-btn hidden" title="Rename group">✏</button>
        <button class="chat-mini-btn group-invite-btn hidden" title="Invite members">➕</button>
        <button class="chat-mini-btn group-members-btn hidden" title="Manage members">👥</button>
        <button class="chat-mini-btn group-leave-btn hidden" title="Leave group">↩</button>
      </div>
    </div>
    <div class="call-strip hidden">
      <span class="call-status">Call inactive</span>
      <button class="msn-btn small end-call-btn">End Call</button>
    </div>
    <div class="media-stage hidden">
      <video class="remote-video" autoplay playsinline></video>
      <video class="local-video" autoplay muted playsinline></video>
    </div>
    <div class="chat-messages"></div>
    <div class="typing-indicator hidden"><em class="typing-text"></em></div>
    <div class="chat-toolbar">
      <button class="chat-tool-btn attach-btn" title="Send file">📎</button>
      <button class="chat-tool-btn nudge-btn" title="Nudge">💥</button>
      <button class="chat-tool-btn wink-btn" title="Wink">😜</button>
      <input type="file" class="hidden file-input" />
    </div>
    <div class="chat-input-row">
      <textarea class="chat-input" placeholder="Type a message..." rows="3"></textarea>
      <button class="msn-btn primary send-btn">Send</button>
    </div>
  </div>
</template>

<script src="/socket.io/socket.io.js"></script>
<script src="js/app.js"></script>
</body>
</html>
